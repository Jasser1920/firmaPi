security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                target: app_login  # Redirect to login after logout

    access_control:
        # ✅ Allow non-authenticated users to access login and register pages
        - { path: ^/(login|register), roles: PUBLIC_ACCESS }

        # ✅ Only ROLE_ADMIN can access /admin (others are redirected)
        - { path: ^/admin, roles: ROLE_ADMIN }
        # ✅ Only authenticated users can access /home
        - { path: ^/home, roles: ROLE_BUYER }

        # ❌ Redirect all other pages to login if not authenticated
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
